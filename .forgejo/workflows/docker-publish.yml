name: Release on Push to Main Branch

on:
  push:
    branches:
      - main
      - dev

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DOCKER_API_VERSION: "1.43"

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check if version.json changed
        id: version_check
        run: |
          if ! git rev-parse HEAD~1 > /dev/null 2>&1; then
            echo "No previous commit — treating version.json as changed."
            echo "version_changed=true" >> $GITHUB_ENV
          elif git diff --name-only HEAD~1 HEAD | grep -q "^version.json$"; then
            echo "version_changed=true" >> $GITHUB_ENV
          else
            echo "version.json was not changed — skipping release."
            echo "version_changed=false" >> $GITHUB_ENV
          fi

      - name: Set up Docker Buildx
        if: env.version_changed == 'true'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          driver: docker

      - name: Extract version from version.json
        id: get_version
        if: env.version_changed == 'true'
        run: |
          VERSION=$(jq -r '.version' version.json)
          DOCKER_TAG="${VERSION/v/}"
          DOCKER_TAG="${DOCKER_TAG/+/-}"
          FORGEJO_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "version=$VERSION" >> $GITHUB_ENV
          echo "docker_tag=$DOCKER_TAG" >> $GITHUB_ENV
          echo "forgejo_repo=$FORGEJO_REPO" >> $GITHUB_ENV

      - name: Determine if Pre-release and Type
        id: prerelease_check
        if: env.version_changed == 'true'
        run: |
          if [[ "${{ env.version }}" == *"-alpha"* ]]; then
            echo "pre_release=true" >> $GITHUB_ENV
            echo "pre_release_type=alpha" >> $GITHUB_ENV
          elif [[ "${{ env.version }}" == *"-beta"* ]]; then
            echo "pre_release=true" >> $GITHUB_ENV
            echo "pre_release_type=beta" >> $GITHUB_ENV
          elif [[ "${{ env.version }}" == *"-rc"* ]]; then
            echo "pre_release=true" >> $GITHUB_ENV
            echo "pre_release_type=rc" >> $GITHUB_ENV
          elif [[ "${{ env.version }}" =~ ^v0\..* ]]; then
            echo "pre_release=true" >> $GITHUB_ENV
            echo "pre_release_type=dev" >> $GITHUB_ENV
          else
            echo "pre_release=false" >> $GITHUB_ENV
            echo "pre_release_type=" >> $GITHUB_ENV
          fi

      - name: Enforce branch/release type rules
        if: env.version_changed == 'true'
        run: |
          if [[ "${{ github.ref_name }}" == "dev" && "${{ env.pre_release }}" == "false" ]]; then
            echo "ERROR: Stable releases cannot be made from the dev branch."
            exit 1
          fi
          if [[ "${{ github.ref_name }}" == "main" && "${{ env.pre_release }}" == "true" ]]; then
            echo "ERROR: Pre-release versions cannot be released from the main branch."
            exit 1
          fi

      - name: Get All Relevant Commit Messages for Release Notes
        id: commit_messages
        if: env.version_changed == 'true'
        run: |
          LAST_STABLE_TAG=$(git tag -l | grep -E '^v[0-9]+(\.[0-9]+)*$' | sort -V | tail -1)
          echo "Last stable tag: $LAST_STABLE_TAG"
          git log "$LAST_STABLE_TAG"..HEAD --pretty=format:"* %h: %s (by %an)" | sed 's/[$&`"'\''\\\/]/\\&/g' | sed ':a;N;$!ba;s/\n/#NEWLINE#/g' > sanitized_commits.txt

      - name: Prepare Release Notes
        if: env.version_changed == 'true'
        run: |
          SANITIZED_COMMITS=$(< sanitized_commits.txt)
          SANITIZED_COMMITS_WITH_NEWLINES=$(echo "$SANITIZED_COMMITS" | sed 's/#NEWLINE#/\n/g')
          {
            echo "Automated release of version ${{ env.version }}"
            echo ""
            echo "### Commits in this release:"
            echo "$SANITIZED_COMMITS_WITH_NEWLINES"
          } > release_body.txt

      - name: Create Forgejo Release
        if: env.version_changed == 'true'
        run: |
          BODY=$(cat release_body.txt)
          PRE_RELEASE=${{ env.pre_release }}
          curl -s -X POST "${{ secrets.FORGEJO_URL }}/api/v1/repos/${{ github.repository }}/releases" \
            -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"${{ env.version }}\",
              \"name\": \"${{ env.version }}\",
              \"body\": $(echo "$BODY" | jq -Rs .),
              \"draft\": false,
              \"prerelease\": $PRE_RELEASE
            }"

      - name: Login to GitHub Container Registry
        if: env.version_changed == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USERNAME }}
          password: ${{ secrets.GH_PAT }}

      - name: Login to Forgejo Container Registry
        if: env.version_changed == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ secrets.FORGEJO_REGISTRY }}
          username: ${{ secrets.FORGEJO_USERNAME }}
          password: ${{ secrets.FORGEJO_TOKEN }}

      - name: Build Docker Image (Pre-release)
        if: env.version_changed == 'true' && env.pre_release == 'true'
        run: |
          docker build \
            -t ghcr.io/${{ secrets.GHCR_REPO }}:${{ env.docker_tag }} \
            -t ghcr.io/${{ secrets.GHCR_REPO }}:latest-dev \
            -t ${{ secrets.FORGEJO_REGISTRY }}/${{ env.forgejo_repo }}:${{ env.docker_tag }} \
            -t ${{ secrets.FORGEJO_REGISTRY }}/${{ env.forgejo_repo }}:latest-dev \
            .

      - name: Build Docker Image (Stable)
        if: env.version_changed == 'true' && env.pre_release == 'false'
        run: |
          docker build \
            -t ghcr.io/${{ secrets.GHCR_REPO }}:${{ env.docker_tag }} \
            -t ghcr.io/${{ secrets.GHCR_REPO }}:latest \
            -t ${{ secrets.FORGEJO_REGISTRY }}/${{ env.forgejo_repo }}:${{ env.docker_tag }} \
            -t ${{ secrets.FORGEJO_REGISTRY }}/${{ env.forgejo_repo }}:latest \
            .

      - name: Push to GitHub Container Registry (Pre-release)
        if: env.version_changed == 'true' && env.pre_release == 'true'
        run: |
          docker push ghcr.io/${{ secrets.GHCR_REPO }}:${{ env.docker_tag }}
          docker push ghcr.io/${{ secrets.GHCR_REPO }}:latest-dev

      - name: Push to GitHub Container Registry (Stable)
        if: env.version_changed == 'true' && env.pre_release == 'false'
        run: |
          docker push ghcr.io/${{ secrets.GHCR_REPO }}:${{ env.docker_tag }}
          docker push ghcr.io/${{ secrets.GHCR_REPO }}:latest

      - name: Push to Forgejo Container Registry (Pre-release)
        if: env.version_changed == 'true' && env.pre_release == 'true'
        run: |
          docker push ${{ secrets.FORGEJO_REGISTRY }}/${{ env.forgejo_repo }}:${{ env.docker_tag }}
          docker push ${{ secrets.FORGEJO_REGISTRY }}/${{ env.forgejo_repo }}:latest-dev

      - name: Push to Forgejo Container Registry (Stable)
        if: env.version_changed == 'true' && env.pre_release == 'false'
        run: |
          docker push ${{ secrets.FORGEJO_REGISTRY }}/${{ env.forgejo_repo }}:${{ env.docker_tag }}
          docker push ${{ secrets.FORGEJO_REGISTRY }}/${{ env.forgejo_repo }}:latest