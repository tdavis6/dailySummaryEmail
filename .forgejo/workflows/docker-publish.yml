name: Package releases

on:
  workflow_dispatch:
  push:
    branches:
      - stable
      - dev
    paths:
      - version.json

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DOCKER_API_VERSION: "1.43"

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Preflight release rules
        id: preflight
        run: |
          VERSION=$(jq -r '.version' version.json)
          DOCKER_TAG="${VERSION/v/}"
          DOCKER_TAG="${DOCKER_TAG/+/-}"
          FORGEJO_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          BRANCH="${{ github.ref_name }}"

          PRE_RELEASE=false
          PRE_RELEASE_TYPE=""

          if [[ "$VERSION" == *"-alpha"* ]]; then
            PRE_RELEASE=true
            PRE_RELEASE_TYPE=alpha
          elif [[ "$VERSION" == *"-beta"* ]]; then
            PRE_RELEASE=true
            PRE_RELEASE_TYPE=beta
          elif [[ "$VERSION" == *"-rc"* ]]; then
            PRE_RELEASE=true
            PRE_RELEASE_TYPE=rc
          elif [[ "$VERSION" =~ ^v0\..* ]]; then
            PRE_RELEASE=true
            PRE_RELEASE_TYPE=dev
          fi

          SHOULD_RELEASE=true
          SKIP_REASON=""

          if [[ "$BRANCH" == "dev" ]]; then
            git fetch origin stable --depth=1
            STABLE=$(git show origin/stable:version.json 2>/dev/null | jq -r '.version' 2>/dev/null || true)

            if [[ -n "$STABLE_VERSION" && "$VERSION" == "$STABLE_VERSION" ]]; then
              SHOULD_RELEASE=false
              SKIP_REASON="Skipping release: version.json matches stable ($VERSION)."
            elif [[ "$PRE_RELEASE" != true ]]; then
              SHOULD_RELEASE=false
              SKIP_REASON="Skipping release: stable versions are not published from dev."
            fi
          elif [[ "$BRANCH" == "stable" ]]; then
            if [[ "$PRE_RELEASE" == true ]]; then
              SHOULD_RELEASE=false
              SKIP_REASON="Skipping release: pre-release versions are not published from stable."
            fi
          else
            SHOULD_RELEASE=false
            SKIP_REASON="Skipping release: unsupported branch '$BRANCH'."
          fi

          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "skip_reason=$SKIP_REASON" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "docker_tag=$DOCKER_TAG" >> "$GITHUB_OUTPUT"
          echo "forgejo_repo=$FORGEJO_REPO" >> "$GITHUB_OUTPUT"
          echo "pre_release=$PRE_RELEASE" >> "$GITHUB_OUTPUT"
          echo "pre_release_type=$PRE_RELEASE_TYPE" >> "$GITHUB_OUTPUT"

          echo "version=$VERSION" >> "$GITHUB_ENV"
          echo "docker_tag=$DOCKER_TAG" >> "$GITHUB_ENV"
          echo "forgejo_repo=$FORGEJO_REPO" >> "$GITHUB_ENV"
          echo "pre_release=$PRE_RELEASE" >> "$GITHUB_ENV"
          echo "pre_release_type=$PRE_RELEASE_TYPE" >> "$GITHUB_ENV"

          if [[ "$SHOULD_RELEASE" == false ]]; then
            echo "$SKIP_REASON"
          else
            echo "Release enabled for $BRANCH with version $VERSION"
          fi

      - name: Explain why release was skipped
        if: steps.preflight.outputs.should_release != 'true'
        run: echo "${{ steps.preflight.outputs.skip_reason }}"

      - name: Set up Docker Buildx
        if: steps.preflight.outputs.should_release == 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          driver: docker

      - name: Get All Relevant Commit Messages for Release Notes
        if: steps.preflight.outputs.should_release == 'true'
        id: commit_messages
        run: |
          LAST_STABLE_TAG=$(git tag -l | grep -E '^v[0-9]+(\.[0-9]+)*$' | sort -V | tail -1)
          echo "Last stable tag: $LAST_STABLE_TAG"
          git log "$LAST_STABLE_TAG"..HEAD --pretty=format:"* %h: %s (by %an)" | sed 's/[$&`"'\''\\\/]/\\&/g' | sed ':a;N;$!ba;s/\n/#NEWLINE#/g' > sanitized_commits.txt

      - name: Prepare Release Notes
        if: steps.preflight.outputs.should_release == 'true'
        run: |
          SANITIZED_COMMITS=$(< sanitized_commits.txt)
          SANITIZED_COMMITS_WITH_NEWLINES=$(echo "$SANITIZED_COMMITS" | sed 's/#NEWLINE#/\n/g')
          {
            echo "Automated release of version ${{ env.version }}"
            echo ""
            echo "### Commits in this release:"
            echo "$SANITIZED_COMMITS_WITH_NEWLINES"
          } > release_body.txt

      - name: Create Forgejo Release
        if: steps.preflight.outputs.should_release == 'true'
        run: |
          BODY=$(cat release_body.txt)
          PRE_RELEASE=${{ env.pre_release }}
          curl -s -X POST "${{ secrets.FORGEJO_URL }}/api/v1/repos/${{ github.repository }}/releases" \
            -H "Authorization: token ${{ secrets.FJ_PAT }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"${{ env.version }}\",
              \"name\": \"${{ env.version }}\",
              \"body\": $(echo "$BODY" | jq -Rs .),
              \"draft\": false,
              \"prerelease\": $PRE_RELEASE
            }"

      - name: Login to GitHub Container Registry
        if: steps.preflight.outputs.should_release == 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GH_USERNAME }}
          password: ${{ secrets.GH_PAT }}

      - name: Login to Forgejo Container Registry
        if: steps.preflight.outputs.should_release == 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ secrets.FORGEJO_REGISTRY }}
          username: ${{ secrets.FORGEJO_USERNAME }}
          password: ${{ secrets.FJ_PAT }}

      - name: Build Docker Image (Pre-release)
        if: steps.preflight.outputs.should_release == 'true' && env.pre_release == 'true'
        run: |
          docker build \
            -t ghcr.io/${{ secrets.GHCR_REPO }}:${{ env.docker_tag }} \
            -t ghcr.io/${{ secrets.GHCR_REPO }}:latest-dev \
            -t ${{ secrets.FORGEJO_REGISTRY }}/${{ env.forgejo_repo }}:${{ env.docker_tag }} \
            -t ${{ secrets.FORGEJO_REGISTRY }}/${{ env.forgejo_repo }}:latest-dev \
            .

      - name: Build Docker Image (Stable)
        if: steps.preflight.outputs.should_release == 'true' && env.pre_release == 'false'
        run: |
          docker build \
            -t ghcr.io/${{ secrets.GHCR_REPO }}:${{ env.docker_tag }} \
            -t ghcr.io/${{ secrets.GHCR_REPO }}:latest \
            -t ${{ secrets.FORGEJO_REGISTRY }}/${{ env.forgejo_repo }}:${{ env.docker_tag }} \
            -t ${{ secrets.FORGEJO_REGISTRY }}/${{ env.forgejo_repo }}:latest \
            .

      - name: Push to GitHub Container Registry (Pre-release)
        if: steps.preflight.outputs.should_release == 'true' && env.pre_release == 'true'
        run: |
          docker push ghcr.io/${{ secrets.GHCR_REPO }}:${{ env.docker_tag }}
          docker push ghcr.io/${{ secrets.GHCR_REPO }}:latest-dev

      - name: Push to GitHub Container Registry (Stable)
        if: steps.preflight.outputs.should_release == 'true' && env.pre_release == 'false'
        run: |
          docker push ghcr.io/${{ secrets.GHCR_REPO }}:${{ env.docker_tag }}
          docker push ghcr.io/${{ secrets.GHCR_REPO }}:latest

      - name: Push to Forgejo Container Registry (Pre-release)
        if: steps.preflight.outputs.should_release == 'true' && env.pre_release == 'true'
        run: |
          docker push ${{ secrets.FORGEJO_REGISTRY }}/${{ env.forgejo_repo }}:${{ env.docker_tag }}
          docker push ${{ secrets.FORGEJO_REGISTRY }}/${{ env.forgejo_repo }}:latest-dev

      - name: Push to Forgejo Container Registry (Stable)
        if: steps.preflight.outputs.should_release == 'true' && env.pre_release == 'false'
        run: |
          docker push ${{ secrets.FORGEJO_REGISTRY }}/${{ env.forgejo_repo }}:${{ env.docker_tag }}
          docker push ${{ secrets.FORGEJO_REGISTRY }}/${{ env.forgejo_repo }}:latest
